<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1a1921;
            color: white;
            padding: 30px;
            text-align: center;
        }
        input, button{
           padding: 10px;
           margin: 10px;
           border-radius: 5px;
           border: none;
           font-size: 1rem;
        }
        button{
            background-color: #f09819;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }
        #res {
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #f09919;
        }
    </style>
</head>
<body>
    <h1>Verificador de Nacionalidade</h1>
    <p>Em qual pais voce está vivendo atualmente?</p>


    <input type="text" name="txtpais" id="txtpais" placeholder="Ex: brasil, japão...">
     <button onclick="verificar()">Verificar</button>
    
     <div id="res" >
        O resultado vai aparecer aqui...
    </div>

    <script>
        function verificar(){
            //pegamos a caixinha de texto do HTML
            var txtp = document.querySelector('#txtpais')
           
            var res = document.querySelector('#res')
           
            var pais = txtp.value
            
            res.innerHTML = `<p>Vivendo em <strong>${pais}</strong></p>`

            if (pais.toLowerCase() == 'brasil'){
                res.innerHTML += `<p>Você é <strong>Brasileiro!</strong></p>`
            } else {
                res.innerHTML += `<p>Você é <strong>Estrangeiro!</strong> </p>`
            }
        }
    </script>
    
</body>
</html>
